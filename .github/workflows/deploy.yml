name: Deploy to Vercel

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel Environment (Production)
        if: startsWith(github.ref, 'refs/tags/v')
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel Environment (Preview)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Production)
        if: startsWith(github.ref, 'refs/tags/v')
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Preview)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Production
        if: startsWith(github.ref, 'refs/tags/v')
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        if: "!startsWith(github.ref, 'refs/tags/v')"
        id: preview
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          vercel alias set "$url" staging-vidq.vercel.app --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          echo "### Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "Preview: $url" >> "$GITHUB_STEP_SUMMARY"
          echo "Staging: https://staging-vidq.vercel.app" >> "$GITHUB_STEP_SUMMARY"
